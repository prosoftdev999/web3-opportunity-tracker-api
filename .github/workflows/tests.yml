name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opportunity_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opportunity_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: Web3 Opportunity Tracker API
      APP_VERSION: 1.0.0
      DEBUG: "false"
      API_V1_PREFIX: /api/v1

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/opportunity_tracker

      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

      GITHUB_TOKEN: ""
      REFRESH_INTERVAL_MINUTES: "60"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run Ruff
        run: ruff check app tests

      - name: Run tests with coverage
        run: |
          pytest -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60