services:
  db:
    image: postgres:17-alpine
    container_name: opportunity-tracker-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opportunity_tracker

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d opportunity_tracker
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: opportunity-tracker-redis
    restart: unless-stopped

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: opportunity-tracker-api
    restart: unless-stopped

    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

    env_file:
      - .env

    ports:
      - "8001:8000"

    volumes:
      - .:/app

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: opportunity-tracker-worker
    restart: unless-stopped

    command:
      - celery
      - -A
      - app.tasks.celery_app:celery_app
      - worker
      - --loglevel=info

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: